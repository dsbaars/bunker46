services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bunker46
      POSTGRES_PASSWORD: bunker46
      POSTGRES_DB: bunker46
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not published to the host: the server reaches Postgres over the internal Docker network
    # (db:5432). For local host access use docker-compose.dev.yml instead.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bunker46"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    # Not published to the host: only reachable over the internal Docker network (redis:6379).
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://bunker46:bunker46@db:5432/bunker46
      # Secrets have NO defaults on purpose: the server fails to start unless you provide strong
      # values (e.g. in a .env file next to this compose). Generate with `openssl rand -base64 48`.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET to a strong random value (openssl rand -base64 48)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET to a strong random value}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY to a strong random value (openssl rand -base64 48)}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      REDIS_URL: redis://redis:6379
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Bunker46}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Public sign-ups disabled by default in production; the very first account can still be
      # created (first-run bootstrap). Set ALLOW_REGISTRATION=true to allow open registration.
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      # Comma-separated wss:// relay URLs when none are stored in DB; omit for built-in defaults
      NOSTR_DEFAULT_RELAYS: ${NOSTR_DEFAULT_RELAYS:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - server

volumes:
  pgdata:
